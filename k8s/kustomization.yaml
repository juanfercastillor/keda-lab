apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests for the KEDA lab. The Prometheus-based ScaledObject is the
# default; alternative triggers live in keda-scaledobject-alternatives.yaml
# and are intentionally NOT included here.
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - keda-scaledobject.yaml

images:
  - name: keda-lab
    newName: keda-lab
    newTag: latest
