apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-lab
  namespace: keda-lab
  labels:
    app.kubernetes.io/name: keda-lab
    app.kubernetes.io/part-of: keda-lab
spec:
  # Replicas are managed by KEDA at runtime; this is only the initial value.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keda-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keda-lab
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: keda-lab
          image: keda-lab:latest
          # For a local kind/minikube cluster the image is side-loaded, so we
          # must not try to pull it from a remote registry.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Make each job expensive enough that a backlog builds up quickly.
            # (Spring relaxed binding of keda-lab.processing-cost-millis)
            - name: KEDALAB_PROCESSINGCOSTMILLIS
              value: "1500"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
